name: GitHub Native CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Suppresses the Node 20 warning spam by forcing the runner architecture to Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Continuous Integration (Lint & Test)
  # -------------------------------------------------------------
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Fallback to echo if package.json doesn't exist, preventing exit code 254
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Creating mock steps."
          fi

      - name: Run Linter
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
          else
            echo "Skipping lint: No project files found yet."
          fi

      - name: Run Tests
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          else
            echo "Skipping tests: No test suites found yet."
          fi
